<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltMed – Iniciar Sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { margin: 0; }
  </style>
</head>
<body>

<div class="login-page">
  <!-- Left panel -->
  <div class="login-left">
    <div class="login-brand">
      <div class="logo-wrap">
        <svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="white" stroke-width="2">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <h1>VoltMed</h1>
      <p>Sistema de gestión médica integral</p>
    </div>
    <ul class="login-features">
      <li>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Registro y gestión completa de médicos
      </li>
      <li>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Administración de pacientes
      </li>
      <li>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Reserva y cancelación de consultas
      </li>
      <li>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Dashboard con estadísticas en tiempo real
      </li>
    </ul>
  </div>

  <!-- Right panel: login form -->
  <div class="login-right">
    <div class="login-form-box">
      <h2>Bienvenido</h2>
      <p>Ingrese sus credenciales para continuar</p>

      <div id="login-alert" class="alert alert-danger" style="display:none;"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-user">Usuario</label>
          <div class="input-icon-wrap">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="login-user" class="form-control" placeholder="nombre de usuario" required autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Contraseña</label>
          <div class="input-icon-wrap" style="position:relative;">
            <span class="input-icon">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="login-pass" class="form-control" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="password-toggle" id="toggle-pass">
              <svg id="eye-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember-me" />
            Recordarme
          </label>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.7rem;" id="login-btn">
          Iniciar sesión
        </button>
      </form>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) window.location.href = APP_BASE + '/dashboard.html';

  const form = document.getElementById('login-form');
  const alert = document.getElementById('login-alert');
  const btn   = document.getElementById('login-btn');
  const togglePass = document.getElementById('toggle-pass');
  const passInput  = document.getElementById('login-pass');

  togglePass.addEventListener('click', () => {
    const isPassword = passInput.type === 'password';
    passInput.type = isPassword ? 'text' : 'password';
    document.getElementById('eye-icon').innerHTML = isPassword
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const login     = document.getElementById('login-user').value.trim();
    const contrasena = document.getElementById('login-pass').value;

    if (!login || !contrasena) {
      alert.textContent = 'Por favor complete todos los campos.';
      alert.style.display = 'flex';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Ingresando...';
    alert.style.display = 'none';

    try {
      await AuthAPI.login(login, contrasena);
      window.location.href = APP_BASE + '/dashboard.html';
    } catch (err) {
      alert.textContent = err.message || 'Credenciales incorrectas.';
      alert.style.display = 'flex';
      btn.disabled = false;
      btn.textContent = 'Iniciar sesión';
    }
  });
</script>
</body>
</html>
